packages:
  - packages/**

defines:
  - &eslint ^10.0.1
  - &vitest 4.0.18
  - &vite 7.3.1
  - &oxc ^0.92.0

overrides:
  oxc-parser: 'catalog:'
  oxc-minify: 'catalog:'
  oxc-transform: 'catalog:'
 
catalog:
  '@eslint/js': *eslint
  '@rspack/core': ^1.5.7
  '@types/node': ^25.4.0
  '@vitest/coverage-v8': *vitest
  '@arethetypeswrong/cli': 0.18.2
  'eslint-plugin-unicorn': 63.0.0
  bumpp: ^10.4.1
  change-case: ^5.4.4
  colorizr: 4.0.1
  esbuild: ^10.0.3
  eslint: ^10.0.3
  happy-dom: ^20.8.3
  monoman: ^0.8.1
  pkg-types: ^2.3.0
  publint: ^0.3.18
  tsdown: 0.21.1
  tsx: ^4.20.5
  rimraf: 6.1.3
  typescript-eslint: 8.52.0
  typescript: ^5.9.2
  typedoc: 0.28.17
  json5: 2.2.3
  unplugin-macros: ^0.19.0
  unplugin-unused: ^0.5.7
  unplugin: ^3.0.0
  vite: *vite
  vitest: *vitest
  oxc-minify: *oxc
  oxc-parser: *oxc
  oxc-resolver: ^11.8.3
  oxc-transform: *oxc
